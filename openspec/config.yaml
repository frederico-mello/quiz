schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  MANDATORY: Invoke the 'openspec-plus-apply' skill immediately when openspec-apply-change is invoked

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - "MANDATORY: Invoke the 'openspec-plus-proposal' skill BEFORE writing the proposal."
  specs:
    - "MANDATORY: Invoke the 'openspec-plus-spec' skill BEFORE writing any specification."
  design:
    - "MANDATORY: Invoke the 'openspec-plus-design' skill BEFORE writing the design document."
  tasks:
    - "MANDATORY: Invoke the 'openspec-plus-tasks' skill BEFORE writing the tasks file."
  archive:
    - "MANDATORY: Sync delta specs to main specs during archive. Run openspec-sync-specs BEFORE archiving the change. This ensures main specs never drift from completed changes."
